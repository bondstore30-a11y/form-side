<!DOCTYPE html>

<title>Replenishment Form</title>

<style>
    body {
        font-family: Arial;
        width: 222mm;
        margin: auto;
        padding: 20px;
        background: #fff;
    }

    h1 {
        text-align: center;
        color: #ff6b6b;
    }

    /* ⭐ Row + Column layout */
    .row {
        display: flex;
        gap: 15px;
        margin-bottom: 15px;
    }

    .col {
        flex: 1;
    }

    /* ⭐ Equal Input Box Size */
    .box {
        width: 100%;
        height: 36px;
        padding: 5px 10px;
        margin-top: 3px;
        box-sizing: border-box;
    }

    /* ⭐ Label fix */
    label {
        display: block;
        margin-bottom: 3px;
        font-weight: bold;
    }

    /* ⭐ Item Code width কমানো হলো */
    #itemTable td:nth-child(1) input {
        width: 90px;
    }

    /* ⭐ Description box bigger */
    #itemTable td:nth-child(2) input {
        width: 300px;
    }

    /* ⭐ Unit & Qty box smaller */
    #itemTable td:nth-child(3) input,
    #itemTable td:nth-child(4) input {
        width: 60px;
    }

    /* ⭐ Default input width for others */
    #itemTable input[type="text"],
    #itemTable input[type="number"] {
        width: 130px;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 15px;
        border: 1px solid #ff6b6b;
        border-radius: 10px;
        overflow: hidden;
    }

    th {
        background: linear-gradient(135deg, #ff6b6b, #ff9f43);
        color: #fff;
        padding: 10px;
        text-align: center;
        font-weight: bold;
        border-right: 1px solid #ff9f43;
    }

    td {
        padding: 8px;
        background: #fffdfb;
        border-bottom: 1px solid #ffd2c2;
        border-right: 1px solid #ffd2c2;
    }

    tr:last-child td {
        border-bottom: none;
    }

    td:last-child, th:last-child {
        border-right: none;
    }

    table tr:hover td {
        background: #fff3e6;
    }
</style>
</head>

<script>
// ⭐ GLOBAL: store row to delete
let rowToDelete = null;
let pdfToDeleteIndex = null;


// ⭐ When clicking delete button (ROW DELETE POPUP)
function removeRow(btn) {
    rowToDelete = btn.parentNode.parentNode; // store row
    document.getElementById("passwordPopup").style.display = "flex";
}


// ⭐ PDF delete → Password popup
function deletePDFWithPassword(index) {
    pdfToDeleteIndex = index;

    // ⭐ PDF delete popup আগে বন্ধ করো (যদি থাকে)
    let pdfPopup = document.getElementById("pdfDeletePopup");
    if (pdfPopup) {
        pdfPopup.style.display = "none";
    }

    // ⭐ এখন পাসওয়ার্ড popup দেখাও
    document.getElementById("passwordPopup").style.display = "flex";
}


// ⭐ Close popup
function closePasswordPopup() {
    document.getElementById("passwordPopup").style.display = "none";
    document.getElementById("popupPassword").value = "";
}


// ⭐ Confirm password + delete row or PDF
function confirmPassword() {
    const correctPassword = "12345"; 
    let entered = document.getElementById("popupPassword").value;

    if (entered !== correctPassword) {
        alert("Incorrect password!");
        return;
    }

    // ⭐ Delete Row
    if (rowToDelete) {
        rowToDelete.remove();
        rowToDelete = null;
        alert("Row deleted successfully!");
    }

// ⭐ Delete PDF
if (pdfToDeleteTime !== null) {
    savedPDFs = savedPDFs.filter(p => String(p.time) !== String(pdfToDeleteTime));
    localStorage.setItem("savedPDFs", JSON.stringify(savedPDFs));

    renderPDFCards();
    renderPDFPopup();

    pdfToDeleteTime = null;
    alert("PDF deleted successfully!");
}

    closePasswordPopup();
}
</script>

<script>
// ⭐ Signature Pad Script
let canvas = document.getElementById("signaturePad");
let ctx = canvas.getContext("2d");
let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => { drawing = false; ctx.beginPath(); });
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", (e) => { e.preventDefault(); drawing = true; });
canvas.addEventListener("touchend", (e) => { e.preventDefault(); drawing = false; ctx.beginPath(); });
canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    let touch = e.touches[0];
    let rect = canvas.getBoundingClientRect();
    draw({ offsetX: touch.clientX - rect.left, offsetY: touch.clientY - rect.top });
});

function draw(e) {
    if (!drawing) return;
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#000";
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
}

function clearSignature() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

    let bulkBar = document.createElement("div");
    bulkBar.style = "display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;";

    bulkBar.innerHTML = `
        <div>
            <input type="checkbox" id="selectAllPDF" style="transform:scale(1.2); margin-right:6px;">
            <label for="selectAllPDF">Select All</label>
        </div>

        <div style="display:flex; gap:8px;">
            <button id="bulkDownloadBtn" style="padding:6px 10px; background:#007bff; color:white; border:none; border-radius:6px;">
                Download Selected
            </button>

            <button id="bulkDeleteBtn" style="padding:6px 10px; background:#ff4444; color:white; border:none; border-radius:6px;">
                Delete Selected
            </button>
        </div>
    `;

    list.appendChild(bulkBar);

    document.getElementById("selectAllPDF").addEventListener("change", function () {
        toggleSelectAllPDFs(this);
    });

    document.getElementById("bulkDownloadBtn").addEventListener("click", bulkDownload);
    document.getElementById("bulkDeleteBtn").addEventListener("click", bulkDelete);

    savedPDFs.forEach(pdf => {
        let item = document.createElement("div");
        item.className = "pdf-item";

        item.style.display = "flex";
        item.style.alignItems = "center";
        item.style.gap = "10px";

        let checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "pdf-check";
        checkbox.dataset.id = pdf.time;
        checkbox.style.transform = "scale(1.2)";

        let info = document.createElement("div");
        info.style.cursor = "pointer";
        info.style.flex = "1";
        info.innerHTML = `<b>${pdf.name}</b><br><span style="font-size:13px; opacity:0.8;">${pdf.date}</span>`;
        info.addEventListener("click", () => window.open(pdf.url, "_blank"));

        let btnBox = document.createElement("div");
        btnBox.style.display = "flex";
        btnBox.style.gap = "6px";

        let downloadBtn = document.createElement("button");
        downloadBtn.style.background = "#007bff";
        downloadBtn.textContent = "⬇";
        downloadBtn.addEventListener("click", () => downloadPDF(pdf.url, pdf.name + ".pdf"));

        let deleteBtn = document.createElement("button");
        deleteBtn.className = "btn-delete";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", () => deletePDFWithPassword(pdf.time));

        btnBox.appendChild(downloadBtn);
        btnBox.appendChild(deleteBtn);

        item.appendChild(checkbox);
        item.appendChild(info);
        item.appendChild(btnBox);

        list.appendChild(item);
    });

    popup.style.display = "block";
}

function filterPDFList() {
    let input = document.getElementById("pdfSearch").value.toLowerCase();
    let items = document.querySelectorAll(".pdf-item");

    items.forEach(item => {
        let text = item.querySelector("b").innerText.toLowerCase();
        item.style.display = text.includes(input) ? "flex" : "none";
    });
}

function downloadPDF(url, fileName) {
    let a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
}

function toggleSelectAllPDFs(master) {
    let checks = document.querySelectorAll(".pdf-check");
    checks.forEach(chk => chk.checked = master.checked);
}

function bulkDownload() {
    let selected = document.querySelectorAll(".pdf-check:checked");

    if (selected.length === 0) {
        alert("Please select at least one PDF.");
        return;
    }

    selected.forEach(chk => {
        let pdf = savedPDFs.find(p => p.time == chk.dataset.id);
        if (pdf) downloadPDF(pdf.url, pdf.name + ".pdf");
    });
}

function bulkDelete() {
    let selected = document.querySelectorAll(".pdf-check:checked");

    if (selected.length === 0) {
        alert("Please select at least one PDF.");
        return;
    }

    // ⭐ Collect IDs for password-protected delete
    bulkDeleteIDs = Array.from(selected).map(chk => chk.dataset.id);

    // ⭐ Open password popup
    document.getElementById("passwordPopup").style.display = "flex";
}

</script>
